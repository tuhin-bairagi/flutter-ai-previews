name: Flutter Build & Preview Deploy

on:
  push:
    branches: [main]
    paths:
      - 'generated_projects/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Detect changed projects
        run: |
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- generated_projects/ | cut -d'/' -f2 | sort -u | tr '\n' ' ')
          else
            CHANGED=$(git ls-tree -r --name-only HEAD generated_projects/ | cut -d'/' -f2 | sort -u | tr '\n' ' ')
          fi
          echo "CHANGED_PROJECTS=$CHANGED" >> $GITHUB_ENV

      - name: Build, deploy, and notify
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT: ${{ secrets.FIREBASE_PROJECT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          BUILD_WEBHOOK_SECRET: ${{ secrets.BUILD_WEBHOOK_SECRET }}
        run: |
          SUPABASE_URL="${SUPABASE_URL:-https://vyhfrlielfsbymkntjvg.supabase.co}"
          SUPABASE_ANON_KEY="${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5aGZybGllbGZzYnlta250anZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODQ1OTUsImV4cCI6MjA4ODY2MDU5NX0.tNi3ShqLupcY8_o6eNaDQr9UjxeNFr6Q0rt06m7MMus}"

          if [ -z "$CHANGED_PROJECTS" ]; then
            echo "No changed projects found."
            exit 0
          fi

          for PROJECT_ID in $CHANGED_PROJECTS; do
            [ -z "$PROJECT_ID" ] && continue
            echo "Processing project: $PROJECT_ID"

            STATUS=failed
            PREVIEW_URL=""

            if [ ! -d "generated_projects/$PROJECT_ID" ]; then
              echo "Project directory missing for $PROJECT_ID"
            elif [ ! -f "generated_projects/$PROJECT_ID/pubspec.yaml" ]; then
              echo "pubspec.yaml missing for $PROJECT_ID"
            else
              pushd "generated_projects/$PROJECT_ID"

              flutter pub get
              PUB_STATUS=$?

              if [ $PUB_STATUS -eq 0 ]; then
                flutter build web --release --web-renderer canvaskit
                BUILD_STATUS=$?
              else
                BUILD_STATUS=1
              fi

              if [ $BUILD_STATUS -eq 0 ] && [ -n "$FIREBASE_TOKEN" ] && [ -n "$FIREBASE_PROJECT" ]; then
                RESULT=$(firebase hosting:channel:deploy "$PROJECT_ID" --project "$FIREBASE_PROJECT" --token "$FIREBASE_TOKEN" --only hosting --json 2>&1) || true
                echo "$RESULT"
                PREVIEW_URL=$(echo "$RESULT" | jq -r '.result[]?.url // empty' | head -n1)

                if [ -n "$PREVIEW_URL" ]; then
                  STATUS=ready
                else
                  STATUS=failed
                fi
              else
                STATUS=failed
              fi

              popd
            fi

            curl -sS -X POST "$SUPABASE_URL/functions/v1/build-webhook" \
              -H "Content-Type: application/json" \
              -H "apikey: $SUPABASE_ANON_KEY" \
              -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
              -d "{\"projectId\":\"$PROJECT_ID\",\"status\":\"$STATUS\",\"previewUrl\":\"$PREVIEW_URL\",\"secret\":\"${BUILD_WEBHOOK_SECRET:-}\"}" || true
          done